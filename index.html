  let hooks='';
  tps.slice(0,5).forEach((tp,i)=>{hooks+='<div style="display:flex;gap:12px;padding:13px 15px;background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--r-sm);margin-bottom:9px"><span style="width:24px;height:24px;background:linear-gradient(135deg,var(--accent),#FB923C);color:#fff;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;flex-shrink:0">'+(i+1)+'</span><div style="flex:1;font-size:13px;line-height:1.65">'+escapeHtml(tp)+'</div><button class="probe-copy" onclick="copyText('+jsAttr(tp)+', this)">⎘</button></div>';});
  const taLabel=p.thriveCode?('With Tuition Assistance ('+p.thriveCode+')'):'With Tuition Assistance';
  return sHead(p,stage,'Positioning — Anchor to the Gap')+sTip('<strong>Anchor to the gap from Stage 7</strong>. Use their language.')+sScript(script)+'<div class="section-label">The Differentiating Points</div>'+hooks+'<div style="margin-top:18px;padding:16px 18px;background:var(--success-light);border-left:3px solid var(--success);border-radius:var(--r-sm)"><div style="font-size:10.5px;font-weight:700;text-transform:uppercase;color:var(--success);margin-bottom:6px">Program Investment</div><div style="font-size:13.5px;line-height:1.65">"The program runs '+escapeHtml(p.duration)+' at '+escapeHtml(p.effort)+'. The fee is <strong>'+cur+p.landing.toLocaleString()+'</strong>. '+taLabel+', net investment becomes <strong>'+cur+p.net.toLocaleString()+'</strong>. We offer flexible payment options."</div></div>'+sCheck(p,[['pos_anchor','Anchored to gap'],['pos_hooks','Program-specific differentiators'],['pos_fee','Fee + TA + flexible'],['pos_resonate','Does that align?']]);
}

}

  const stage=STAGES[10];

{type:'Payment Plans',phrase:'"Can you break the fee into smaller payments?"',resp:'"Absolutely. Program fee is %landing%. With Tuition Assistance for early enrollment, net investment is %netfee%. You can choose 3-installment or 6-installment plans. I will email the schedule. Helpful?"'},

function stageObjections(p){
  const stage=STAGES[11];const cur=currencySym(p);const savings=p.landing-p.net;
  const fill=s=>s.replace(/%effort%/g,p.effort).replace(/%duration%/g,p.duration).replace(/%netfee%/g,cur+p.net.toLocaleString()).replace(/%landing%/g,cur+p.landing.toLocaleString()).replace(/%thrive%/g,p.thriveCode||'').replace(/%university%/g,p.university).replace(/%short%/g,p.short).replace(/%cohort%/g,p.cohort).replace(/%savings%/g,cur+savings.toLocaleString());

  OBJECTIONS.forEach((o,i)=>{const resp=fill(o.resp);const checkId=p.id+'_obj_'+i;const used=state.checklists[checkId];cards+='<details class="obj-card"><summary><span class="obj-type-pill">'+escapeHtml(o.type)+'</span><span class="obj-phrase">'+escapeHtml(o.phrase)+'</span><span class="obj-expand">expand ↓</span></summary><div class="obj-body"><div class="obj-response-label">Tailored Response for '+escapeHtml(p.short)+'</div><div class="obj-response">'+escapeHtml(resp)+'</div><div style="display:flex;gap:8px;margin-top:12px"><button class="btn btn-primary" onclick="copyText('+jsAttr(resp)+', this)">Copy Response</button><button class="btn '+(used?'btn-success':'')+'" onclick="toggleCheck(\''+checkId+'\')">'+(used?'✓ Used':'Mark used')+'</button></div></div></details>';});

}

yle="margin:10px 0 20px" onclick="copyText('+jsAttr(ask)+', this)">Copy Direct Ask</button><div class="script-label">Alternative Close</div><div class="script-box">'+escapeHtml(alt)+'</div><button class="btn btn-primary" style="margin:10px 0 20px" onclick="copyText('+jsAttr(alt)+', this)">Copy Alternative</button>'+sCheck(p,[['cl_recap','Delivered recap'],['cl_invest','Investment breakdown'],['cl_dates','Cohort and TA'],['cl_directask','Direct assumptive ask'],['cl_nextstep','Confirmed next step']])+'<div class="reminder-box"><span class="reminder-label">After the Call</span><span style="font-size:13px;line-height:1.6">Go to Templates Hub or Quick Chatter. Set Descriptive Documentation. Copy Text or Copy as HTML Table. Paste into Wrike. Send follow-up email within 30 minutes.</span></div>';

/* TA REFUND */
const THRIVE_VALUES={'NA':0,'THRIVE50':50,'THRIVE100':100,'THRIVE200':200};

function getTARefund(progId){
  const p=getProg(progId);
  if(!state.tarefund)state.tarefund={};
  if(!state.tarefund[progId])state.tarefund[progId]={learnerName:'',learnerEmail:'',appId:'',cohortOverride:'',feeOverride:'',initialTA:p.mdr||0,initialThrive:p.thriveCode||'NA',enrollTA:0,enrollThrive:'NA',offeredOverride:'',paidOverride:'',refundOverride:'',justification:'',managerName:state.skipManager||''};
  return state.tarefund[progId];
}

function setTARefundField(progId,key,val){getTARefund(progId);state.tarefund[progId][key]=val;saveState();}

function calcTARefund(progId){
  const p=getProg(progId);const r=getTARefund(progId);
  const fee=r.feeOverride!==''&&!isNaN(parseFloat(r.feeOverride))?parseFloat(r.feeOverride):p.landing;
  const initTA=parseFloat(r.initialTA)||0;
  const initThriveVal=THRIVE_VALUES[r.initialThrive]||0;
  const enrTA=parseFloat(r.enrollTA)||0;
  const enrThriveVal=THRIVE_VALUES[r.enrollThrive]||0;
  const offered=r.offeredOverride!==''&&!isNaN(parseFloat(r.offeredOverride))?parseFloat(r.offeredOverride):(fee*(1-initTA/100)-initThriveVal);
  const paid=r.paidOverride!==''&&!isNaN(parseFloat(r.paidOverride))?parseFloat(r.paidOverride):(fee*(1-enrTA/100)-enrThriveVal);
  const refund=r.refundOverride!==''&&!isNaN(parseFloat(r.refundOverride))?parseFloat(r.refundOverride):(paid-offered);
  return {fee:fee,offered:offered,paid:paid,refund:refund};
}

function revertTARefundField(progId,key){setTARefundField(progId,key,'');updateTARefundDisplay(progId);}

/* === ANTI-FLICKER: targeted DOM updates instead of full re-render === */
function updateTARefundDisplay(progId){
  const calc=calcTARefund(progId);
  const r=getTARefund(progId);
  /* Refresh calculated defaults only if no manual override AND field not currently focused */
  const offeredEl=document.getElementById('taOfferedInput');
  if(offeredEl && document.activeElement!==offeredEl && r.offeredOverride===''){
    offeredEl.value=calc.offered.toFixed(2);
  }
  const paidEl=document.getElementById('taPaidInput');
  if(paidEl && document.activeElement!==paidEl && r.paidOverride===''){
    paidEl.value=calc.paid.toFixed(2);
  }
  const refundEl=document.getElementById('taRefundInput');
  if(refundEl && document.activeElement!==refundEl && r.refundOverride===''){
    refundEl.value=calc.refund.toFixed(2);
  }
  /* Update status badge */
  const badgeEl=document.getElementById('taStatusBadge');
  if(badgeEl){
    let html='';
    if(calc.refund>0)html='<span style="padding:4px 11px;background:var(--success-light);color:var(--success);border-radius:999px;font-size:11.5px;font-weight:700">✓ Refund applicable</span>';
    else if(calc.refund===0)html='<span style="padding:4px 11px;background:var(--bg);color:var(--text-muted);border-radius:999px;font-size:11.5px;font-weight:700">No refund needed</span>';
    else html='<span style="padding:4px 11px;background:var(--warning-light);color:var(--warning);border-radius:999px;font-size:11.5px;font-weight:700">⚠ Paid less than offered</span>';
    badgeEl.innerHTML=html;
  }
  /* Update email button enabled state */
  const emailBtn=document.getElementById('taEmailBtn');
  if(emailBtn){
    const canEmail=r.learnerName&&r.learnerEmail&&r.appId&&r.managerName&&calc.refund>0;
    emailBtn.style.opacity=canEmail?'1':'.45';
    emailBtn.style.cursor=canEmail?'pointer':'not-allowed';
  }
}

function buildTARefundTab(){
  const firstId=state.currentProgram||DEFAULT_PROGRAMS[0].id;
  const p=getProg(firstId);const r=getTARefund(firstId);const calc=calcTARefund(firstId);const cur=currencySym(p);
  const progOpts=DEFAULT_PROGRAMS.map(pp=>'<option value="'+pp.id+'"'+(firstId===pp.id?' selected':'')+'>'+escapeHtml(pp.wrike+' — '+pp.short)+'</option>').join('');
  const taOpts=[0,4,8,10,11].map(v=>'<option value="'+v+'"'+(parseFloat(r.initialTA)===v?' selected':'')+'>'+v+'%</option>').join('');
  const taEnrollOpts=[0,4,8,10,11].map(v=>'<option value="'+v+'"'+(parseFloat(r.enrollTA)===v?' selected':'')+'>'+v+'%</option>').join('');

function getTARefundRows(progId){const p=getProg(progId);const r=getTARefund(progId);const calc=calcTARefund(progId);const cur=currencySym(p);return [['Learner Full Name',r.learnerName||''],['Learner Email',r.learnerEmail||''],['Application ID',r.appId||''],['Program',p.short],['Cohort Start',r.cohortOverride||p.cohort],['Program Fee',cur+(parseFloat(r.feeOverride||calc.fee)).toFixed(2)],['Initial TA Offered (%)',r.initialTA+'%'],['Initial THRIVE Offered',r.initialThrive],['Amount Originally Offered',cur+parseFloat(r.offeredOverride||calc.offered).toFixed(2)],['TA at Enrollment (%)',r.enrollTA+'%'],['THRIVE at Enrollment',r.enrollThrive],['Amount Paid at Enrollment',cur+parseFloat(r.paidOverride||calc.paid).toFixed(2)],['Refund Amount Due',cur+parseFloat(r.refundOverride||calc.refund).toFixed(2)],['Justification',r.justification||'']];}

function copyTARefund(progId,btn){const p=getProg(progId);copyAsHtmlTable('TA REFUND — '+p.wrike,getTARefundRows(progId),btn);}

function copyTARefundEmail(progId,btn){
  const p=getProg(progId);
  const r=getTARefund(progId);
  const calc=calcTARefund(progId);
  if(!r.learnerName||!r.learnerEmail||!r.appId||!r.managerName){
    showToast('Fill Name, Email, App ID, Manager');
    return;
  }
  if(calc.refund<=0){
    showToast('Refund must be > 0');
    return;
  }
  const adv=state.advisorName||'Advisor';
  const subject='TA Refund Approval Request - '+r.learnerName+' - '+r.appId;
  const rows=getTARefundRows(progId);
  const headerStyle='background:#3B2A82;background:linear-gradient(135deg,#3B2A82,#5847A5);color:#FFFFFF;padding:14px 18px;text-align:center;font-size:15px;font-weight:800;border:1px solid #241754;letter-spacing:.6px;text-shadow:0 1px 2px rgba(0,0,0,.35);text-transform:uppercase';
  let table='<table style="border-collapse:collapse;width:100%;max-width:680px;font-family:Arial,sans-serif;font-size:12px;border:1px solid #c0c0c0">';
  table+='<thead><tr><th colspan="2" style="'+headerStyle+'">TA Refund Request &mdash; '+p.wrike+'</th></tr></thead><tbody>';
  rows.forEach(function(row,i){
    const bg=i%2===0?'#ffffff':'#f4f2ec';
    const isRefund=row[0]==='Refund Amount Due';
    const labStyle=isRefund?'padding:9px 14px;font-weight:800;color:#3B2A82;border:1px solid #d1d5db;width:210px;font-size:13px':'padding:7px 14px;font-weight:700;color:#111827;border:1px solid #d1d5db;width:210px';
    const valStyle=isRefund?'padding:9px 14px;color:#3B2A82;border:1px solid #d1d5db;font-weight:800;font-size:15px':'padding:7px 14px;color:#111827;border:1px solid #d1d5db';
    table+='<tr style="background:'+bg+'"><td style="'+labStyle+'">'+row[0]+'</td><td style="'+valStyle+'">'+row[1]+'</td></tr>';
  });
  table+='</tbody></table>';
  const html='<div style="font-family:Arial,sans-serif;font-size:13px;color:#111827">'+
    '<p>Hi '+escapeHtml(r.managerName)+',</p>'+
    '<p>Kindly approve the below additional tuition assistance refund request for the below learner.</p>'+
    table+
    '<p style="margin-top:16px">I would really appreciate if this could be approved.</p>'+
    '<p style="margin-top:14px">Warm regards,<br><strong>'+escapeHtml(adv)+'</strong><br>Program Advisor, Emeritus</p>'+
    '</div>';
  const plainText='Subject: '+subject+'\n\nHi '+r.managerName+',\n\nKindly approve the below additional tuition assistance refund request for the below learner.\n\n'+
    rows.map(function(rw){return rw[0]+': '+rw[1];}).join('\n')+
    '\n\nI would really appreciate if this could be approved.\n\nWarm regards,\n'+adv+'\nProgram Advisor, Emeritus';
  if(navigator.clipboard&&window.ClipboardItem){
    try{
      const blob=new Blob([html],{type:'text/html'});
      const txtBlob=new Blob([plainText],{type:'text/plain'});
      navigator.clipboard.write([new ClipboardItem({'text/html':blob,'text/plain':txtBlob})]).then(function(){
        if(btn){const t=btn.innerHTML;btn.innerHTML='&#10003; Copied';setTimeout(function(){btn.innerHTML=t;},1500);}
        showToast('Email copied · Subject: '+subject);
      }).catch(function(){copyText(plainText,btn);});
    }catch(e){copyText(plainText,btn);}
  }else{copyText(plainText,btn);}
}

function renderCompare(){if(!state.compareIds)state.compareIds=[];let filters='<div class="cmp-filters"><span style="font-size:10.5px;font-weight:700;text-transform:uppercase;color:var(--text-muted);padding:6px 0">Quick Picks:</span>';[['ai','All AI'],['healthcare','All Healthcare'],['leadership','All Leadership'],['mit','All MIT']].forEach(pr=>{filters+='<button class="cmp-chip" onclick="quickCompare(\''+pr[0]+'\')">'+escapeHtml(pr[1])+'</button>';});filters+='<button class="cmp-chip danger" onclick="clearCompare()">Clear</button></div>';const ids=state.compareIds;let sel='';if(ids.length===0)sel='<div class="cmp-selection-bar"><span>Pick 2 or 3 programs to compare.</span></div>';else{let pills='';ids.forEach(id=>{const p=PROG_BY_ID[id];if(!p)return;pills+='<span class="cmp-sel-pill" onclick="toggleCompare(\''+id+'\')">'+p.wrike+' ×</span>';});sel='<div class="cmp-selection-bar"><span>Selected ('+ids.length+'/3):</span>'+pills+'</div>';}let picker='<div style="font-weight:700;font-size:13px;margin-top:14px">Click programs to add/remove</div><div class="cmp-pick-grid">';DEFAULT_PROGRAMS.forEach(p=>{const picked=ids.indexOf(p.id)>=0;picker+='<div class="cmp-pick'+(picked?' picked':'')+'" onclick="toggleCompare(\''+p.id+'\')"><div class="cmp-pick-uni">'+escapeHtml(p.university)+'</div><div class="cmp-pick-name">'+escapeHtml(p.short)+'</div></div>';});picker+='</div>';let body='';if(ids.length>=2)body=buildCompareTable(ids);else body='<div style="padding:60px 20px;text-align:center;color:var(--text-muted)">Select at least 2 programs.</div>';document.getElementById('viewRoot').innerHTML='<div class="fade-in"><div class="hub-header"><div><div class="hub-title">Compare Programs</div><div class="hub-sub">Side-by-side comparison.</div></div></div>'+filters+sel+body+picker+'</div>';}
function buildCompareTable(ids){const cols=ids.map(id=>getProg(id));const colTemplate='repeat('+cols.length+',1fr)';function row(label,renderCell){let cells='';cols.forEach(p=>{cells+='<div class="cmp-cell"><div class="cmp-cell-program">'+escapeHtml(p.short)+'</div><div>'+renderCell(p)+'</div></div>';});return '<div class="cmp-row"><div class="cmp-row-head">'+escapeHtml(label)+'</div><div class="cmp-row-body" style="grid-template-columns:'+colTemplate+'">'+cells+'</div></div>';}const sections=[['Investment',p=>{const cur=currencySym(p);return '<div style="font-size:16px;font-weight:700">'+cur+p.landing.toLocaleString()+'</div><div style="font-size:11.5px;color:var(--text-muted);margin-top:3px">Net: <strong style="color:var(--success)">'+cur+p.net.toLocaleString()+'</strong>'+(p.thriveCode?' with '+p.thriveCode:'')+'</div>';}],['Format',p=>escapeHtml(p.duration)+' · '+escapeHtml(p.effort)+'<br><span style="color:var(--text-muted);font-size:11.5px">Cohort: '+escapeHtml(p.cohort)+'</span>'],['Certificate',p=>escapeHtml(p.certificate)+'<br><span style="color:var(--text-muted);font-size:11.5px">'+p.facultyCount+' faculty</span>'],['Faculty',p=>escapeHtml(p.faculty)],['Past Cohort',p=>escapeHtml(p.pastIndustries)],['Designed For',p=>'<ul style="margin:0;padding-left:16px;font-size:11.5px">'+p.designedFor.slice(0,4).map(d=>'<li>'+escapeHtml(d)+'</li>').join('')+'</ul>'],['Walk Away',p=>'<ul style="margin:0;padding-left:16px;font-size:11.5px">'+p.walkAway.slice(0,4).map(w=>'<li>'+escapeHtml(w)+'</li>').join('')+'</ul>'],['Career Roles',p=>p.careerRoles.slice(0,4).map(escapeHtml).join(' · ')]];let table='';sections.forEach(s=>{table+=row(s[0],s[1]);});return table+'<div style="display:flex;gap:9px;margin-top:18px"><button class="btn btn-primary" onclick="copyCompareText()">📋 Copy</button></div>';}
function toggleCompare(id){if(!state.compareIds)state.compareIds=[];const i=state.compareIds.indexOf(id);if(i>=0)state.compareIds.splice(i,1);else{if(state.compareIds.length>=3){showToast('Max 3 programs');return;}state.compareIds.push(id);}saveState();renderCompare();}
function clearCompare(){state.compareIds=[];saveState();renderCompare();}
function quickCompare(kind){let ids=[];if(kind==='ai')ids=['mit-aip','mit-aisl','mit-gai'];else if(kind==='healthcare')ids=['hms-clle','jhu-boh','mit-ailhc'];else if(kind==='leadership')ids=['wh-lmdp','wh-lhpt','imp-mdp'];else if(kind==='mit')ids=['mit-aip','mit-aisl','mit-gai'];state.compareIds=ids;saveState();renderCompare();}
function copyCompareText(){const ids=state.compareIds||[];if(ids.length<2)return;const cols=ids.map(id=>getProg(id));let txt='PROGRAM COMPARISON\n\n';cols.forEach(p=>{const cur=currencySym(p);txt+='='.repeat(60)+'\n'+p.short+' ('+p.wrike+')\n'+p.university+'\n'+'='.repeat(60)+'\nCohort: '+p.cohort+'\nDuration: '+p.duration+'\nFee: '+cur+p.landing.toLocaleString()+' · Net: '+cur+p.net.toLocaleString()+'\n\n';});copyText(txt);}

/* RECOMMENDER */
const REC_STATE={step:1,answers:{domain:null,seniority:null,commitment:null}};
function renderRecommender(){REC_STATE.step=1;REC_STATE.answers={domain:null,seniority:null,commitment:null};renderRecommenderStep();}
function renderRecommenderStep(){const step=REC_STATE.step;const a=REC_STATE.answers;let title='',options=[],key='';if(step===1){title='What area is your learner focused on?';key='domain';options=[['ai','AI/Data','Building or leading AI'],['healthcare','Healthcare','Hospitals, pharma'],['leadership','Leadership','Cross-functional'],['digital','Digital Transformation','Tech adoption'],['marketing','Marketing','Brand, growth']];}else if(step===2){title='Career stage?';key='seniority';options=[['emerging','Emerging','3-7 years'],['mid','Mid-Career','7-12 years'],['senior','Senior','12-20 years'],['executive','Executive','VP+']];}else if(step===3){title='Time commitment?';key='commitment';options=[['short','6-10 weeks','Quick'],['medium','3-5 months','Substantial'],['long','6+ months','Deep'],['any','Open','Best fit']];}if(step<=3){let opts='';options.forEach(o=>{const sel=a[key]===o[0]?' selected':'';opts+='<div class="rec-option'+sel+'" onclick="recSelect(\''+key+'\',\''+o[0]+'\')"><div class="rec-opt-label">'+escapeHtml(o[1])+'</div><div class="rec-opt-sub">'+escapeHtml(o[2])+'</div></div>';});const dots='<div class="rec-progress">'+[1,2,3].map(n=>'<div class="rec-dot'+(n<=step?' active':'')+'"></div>').join('')+'</div>';let nav='<div style="display:flex;justify-content:space-between;margin-top:8px"><button class="btn btn-ghost"'+(step===1?' disabled style="opacity:.4"':'')+' onclick="recPrev()">← Back</button><button class="btn btn-primary"'+(!a[key]?' disabled style="opacity:.4"':'')+' onclick="recNext()">'+(step===3?'See Recs':'Next')+' →</button></div>';document.getElementById('viewRoot').innerHTML='<div class="fade-in"><div class="hub-header"><div><div class="hub-title">Smart Recommender</div></div></div><div class="rec-wizard">'+dots+'<div class="rec-step-num">Step '+step+' of 3</div><div class="rec-question">'+title+'</div><div class="rec-options">'+opts+'</div>'+nav+'</div></div>';}else renderRecResults();}
function recSelect(key,val){REC_STATE.answers[key]=val;renderRecommenderStep();}
function recPrev(){if(REC_STATE.step>1){REC_STATE.step--;renderRecommenderStep();}}

function updateWorldClocks(){
  const now=new Date();
  WORLD_ZONES.forEach(z=>{
    try{
      const time=now.toLocaleTimeString('en-US',{timeZone:z.tz,hour12:true,hour:'numeric',minute:'2-digit'});
      const date=now.toLocaleDateString('en-US',{timeZone:z.tz,weekday:'short',month:'short',day:'numeric'});
      const hourStr=now.toLocaleTimeString('en-US',{timeZone:z.tz,hour12:false,hour:'numeric'});
      const hour=parseInt(hourStr);
      const timeEl=document.getElementById('clockt-'+z.id);
      const dateEl=document.getElementById('clockd-'+z.id);
      const tileEl=document.getElementById('clock-'+z.id);
      if(timeEl)timeEl.textContent=time;
      if(dateEl)dateEl.textContent=date;
      if(tileEl){
        tileEl.className='clock-tile';
        if(hour>=9&&hour<18)tileEl.className='clock-tile business';
        else if(hour>=22||hour<6)tileEl.className='clock-tile late';
      }
    }catch(e){}
  });
}

function fxConvertUsd(){
  const amount=parseFloat(document.getElementById('fxUsdAmount').value)||0;
  const to=document.getElementById('fxUsdTo').value;
  if(!FX_RATES[to])return;
  document.getElementById('fxUsdResult').value=(amount*FX_RATES[to]).toLocaleString('en-US',{maximumFractionDigits:2,minimumFractionDigits:2});
}

function fxConvertGbp(){
  const amount=parseFloat(document.getElementById('fxGbpAmount').value)||0;
  const to=document.getElementById('fxGbpTo').value;
  if(!FX_RATES[to]||!FX_RATES.GBP)return;
  const usdEquiv=amount/FX_RATES.GBP;
  document.getElementById('fxGbpResult').value=(usdEquiv*FX_RATES[to]).toLocaleString('en-US',{maximumFractionDigits:2,minimumFractionDigits:2});
}

function updateFxTables(){
  ['GBP','EUR','AED','SAR','SGD','JPY','HKD','AUD','INR','NGN'].forEach(code=>{
    const el=document.getElementById('fxval-USD-'+code);
    if(el)el.textContent=FX_RATES[code].toFixed(code==='JPY'||code==='INR'||code==='NGN'?2:4);
  });
  if(FX_RATES.GBP){
    ['USD','EUR','AED','SAR','SGD','JPY','HKD','AUD','INR','NGN'].forEach(code=>{
      const el=document.getElementById('fxval-GBP-'+code);
      if(!el)return;
      const rate=code==='USD'?(1/FX_RATES.GBP):(FX_RATES[code]/FX_RATES.GBP);
      el.textContent=rate.toFixed(code==='JPY'||code==='INR'||code==='NGN'?2:4);
    });
  }
}

function fetchFxRates(){
  const statusEl=document.getElementById('fxStatus');
  if(statusEl)statusEl.innerHTML='<span class="live-dot"></span><span>Fetching live rates...</span>';
  fetch('https://api.exchangerate-api.com/v4/latest/USD').then(r=>r.json()).then(data=>{
    if(data&&data.rates){
      Object.keys(FX_RATES).forEach(code=>{if(data.rates[code])FX_RATES[code]=data.rates[code];});
      updateFxTables();fxConvertUsd();fxConvertGbp();
      if(statusEl){
        statusEl.className='fx-status-pill';
        statusEl.innerHTML='<span class="live-dot"></span><span>Live rates · '+new Date().toLocaleTimeString()+'</span>';
      }
    }
  }).catch(()=>{
    if(statusEl){
      statusEl.className='fx-status-pill warn';
      statusEl.innerHTML='<span>⚠</span><span>Offline fallback rates</span>';
    }
  });
}

function isoDate(humanDate){if(!humanDate)return '';const months={'January':'01','February':'02','March':'03','April':'04','May':'05','June':'06','July':'07','August':'08','September':'09','October':'10','November':'11','December':'12'};const m=humanDate.match(/^([A-Za-z]+)\s+(\d{1,2}),\s+(\d{4})$/);if(m){const mm=months[m[1]];if(!mm)return '';return m[3]+'-'+mm+'-'+String(m[2]).padStart(2,'0');}return '';}

/* NOTIFICATIONS */
function parseCohortDate(human){
  if(!human)return null;
  const months={January:0,February:1,March:2,April:3,May:4,June:5,July:6,August:7,September:8,October:9,November:10,December:11};
  const m=String(human).match(/^([A-Za-z]+)\s+(\d{1,2}),\s+(\d{4})$/);
  if(!m)return null;
  const mo=months[m[1]];if(mo===undefined)return null;
  return new Date(parseInt(m[3]),mo,parseInt(m[2]));
}
function generateNotifications(){
  const notes=[];const today=new Date();today.setHours(0,0,0,0);
  if(!state.advisorName||state.advisorName==='Advisor'){
    notes.push({type:'warn',text:'Complete your profile',meta:'Set Advisor Name in Settings',action:()=>navigate('settings')});
  }
  if(!state.syncUrl){
    notes.push({type:'info',text:'Auto-sync not configured',meta:'Connect to JSON for updates',action:()=>navigate('settings')});
  } else if(state.lastSynced){
    const days=Math.floor((Date.now()-state.lastSynced)/86400000);
    if(days>=2)notes.push({type:'warn',text:'Sync is '+days+' days stale',meta:'Click refresh',action:()=>manualRefresh()});
  }
  DEFAULT_PROGRAMS.forEach(p=>{
    const cohortDate=parseCohortDate(getProg(p.id).cohort);
    if(!cohortDate)return;
    const daysUntil=Math.floor((cohortDate-today)/86400000);
    if(daysUntil>=0&&daysUntil<=14){
      notes.push({type:daysUntil<=7?'danger':'warn',text:p.short+' starts in '+daysUntil+' days',meta:p.wrike+' · '+p.cohort,action:()=>openProgram(p.id)});
    }
  });
  if(!state.importantLinks||state.importantLinks.length===0){
    notes.push({type:'info',text:'Pin your team links',meta:'One-click resource access',action:()=>navigate('links')});
  }
  if((state.recentPrograms||[]).length===0){
    notes.push({type:'info',text:'Start your first call',meta:'Open any program',action:()=>navigate('programs')});
  }
  return notes;
}
function updateNotificationBadge(){
  const notes=generateNotifications();
  const dot=document.getElementById('notifDot');
  if(!dot)return;
  if(notes.length===0){dot.style.display='none';}
  else{dot.style.display='grid';dot.textContent=notes.length>9?'9+':notes.length;}
}
function toggleNotifications(e){
  if(e)e.stopPropagation();
  const existing=document.getElementById('notifPanel');
  if(existing){existing.remove();return;}
  const notes=generateNotifications();
  const panel=document.createElement('div');
  panel.id='notifPanel';
  panel.style.cssText='position:absolute;top:54px;right:0;width:360px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-lg);max-height:480px;overflow-y:auto;z-index:100';
  let html='<div style="padding:14px 18px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between"><div style="font-weight:700;font-size:14px">Notifications'+(notes.length>0?' ('+notes.length+')':'')+'</div></div>';
  if(notes.length===0){html+='<div style="padding:30px 20px;text-align:center;color:var(--text-muted)"><div style="font-size:32px;opacity:.4;margin-bottom:8px">✓</div><div>All caught up</div></div>';}
  else{
    notes.forEach((n,i)=>{
      const colors={warn:'#E68900',danger:'#C62828',success:'#0F9D58',info:'#1976D2'};
      const icon=n.type==='warn'?'⚠':n.type==='danger'?'!':n.type==='success'?'✓':'i';
      html+='<div onclick="handleNotificationClick('+i+')" style="padding:12px 18px;border-bottom:1px solid var(--border-soft);display:flex;gap:11px;cursor:pointer" onmouseover="this.style.background=\'var(--bg)\'" onmouseout="this.style.background=\'\'"><div style="width:32px;height:32px;border-radius:8px;background:'+colors[n.type]+';color:#fff;display:grid;place-items:center;font-size:13px;flex-shrink:0;font-weight:700">'+icon+'</div><div style="flex:1;min-width:0"><div style="font-size:12.5px;font-weight:600;margin-bottom:3px">'+escapeHtml(n.text)+'</div><div style="font-size:11px;color:var(--text-muted)">'+escapeHtml(n.meta)+'</div></div></div>';
    });
  }
  panel.innerHTML=html;
  window._notifList=notes;
  const btn=document.getElementById('notifBtn');
  const parent=btn.parentElement;
  parent.style.position='relative';
  parent.appendChild(panel);
  setTimeout(()=>{document.addEventListener('click',closeNotificationsOutside,{once:true});},100);
}
function closeNotificationsOutside(e){const panel=document.getElementById('notifPanel');if(panel&&!panel.contains(e.target))panel.remove();}
function handleNotificationClick(i){const notes=window._notifList||[];const note=notes[i];if(!note)return;const panel=document.getElementById('notifPanel');if(panel)panel.remove();if(note.action)note.action();}

function handleGlobalSearch(q){
  q=(q||'').toLowerCase().trim();

  const results=[];
  DEFAULT_PROGRAMS.forEach(p=>{
    const score=(p.short.toLowerCase().includes(q)?3:0)+(p.wrike.toLowerCase().includes(q)?3:0)+(p.name.toLowerCase().includes(q)?2:0)+(p.university.toLowerCase().includes(q)?1:0)+(p.uniKey.toLowerCase()===q?2:0);
    if(score>0)results.push({type:'program',score:score,id:p.id,title:p.short,meta:p.wrike+' · '+p.university+' · '+p.duration,uniKey:p.uniKey});
  });
  const views=[
    {key:'templates',title:'Templates Hub',meta:'Chatter · Zendesk · Vendor · TA Refund',keywords:'chatter zendesk vendor template refund'},
    {key:'compare',title:'Compare Programs',meta:'Side-by-side',keywords:'compare vs comparison'},
    {key:'recommender',title:'Smart Recommender',meta:'3-question wizard',keywords:'recommend wizard suggest'},
    {key:'worldtools',title:'World Clock + FX',meta:'12 cities + USD/GBP converter',keywords:'world clock currency time fx nigeria lagos'},
    {key:'bank',title:'Bank Details',meta:'US + SG accounts',keywords:'bank hsbc swift'},
    {key:'links',title:'Important Links',meta:'Pinned resources',keywords:'links wrike salesforce'},
    {key:'references',title:'References',meta:'Documents',keywords:'reference policy'},
    {key:'settings',title:'Settings',meta:'Profile · Sync · Programs',keywords:'settings advisor ring dna config'},
    {key:'quickchatter',title:'Quick Chatter',meta:'One-click Chatter copy',keywords:'quick chatter capsule copy'}
  ];
  views.forEach(v=>{const haystack=(v.title+' '+v.meta+' '+v.keywords).toLowerCase();if(haystack.includes(q))results.push({type:'view',score:v.title.toLowerCase().includes(q)?2:1,key:v.key,title:v.title,meta:v.meta});});
  const stageMap={opening:'Stage 1 — Opening',agenda:'Stage 2 — Agenda',discovery:'Stage 3 — Discovery',role:'Stage 4 — Current Role',goals:'Stage 5 — Goals',challenges:'Stage 6 — Challenges',gap:'Stage 7 — Gap',positioning:'Stage 8 — Positioning',outcomes:'Stage 9 — Outcomes',examples:'Stage 10 — Examples',interest:'Stage 11 — Interest Check',objections:'Stage 12 — Objections',close:'Stage 13 — Value & Close'};
  STAGES.forEach(s=>{if(s.name.toLowerCase().includes(q)||s.key.includes(q)){results.push({type:'stage',score:1,key:s.key,title:stageMap[s.key],meta:'Call flow · '+s.time});}});
  if(q.match(/^(brochure|pdf|download)$/i)){
    DEFAULT_PROGRAMS.forEach(p=>{

    });
  }
  results.sort((a,b)=>b.score-a.score);
  renderSearchResults(results.slice(0,12),q);
}

}

  state.currentView='program';

  pushRecent(pid);
  renderProgramView();

/* QUICK CHATTER */
function renderQuickChatter(){
  const uniColors={'MIT':'#3B2A82','HMS':'#0EA5E9','JHU':'#2563EB','IMP':'#7C3AED','WH':'#E68900','KLG':'#DC2626'};
  const byUni={};
  DEFAULT_PROGRAMS.forEach(function(p){if(!byUni[p.university])byUni[p.university]=[];byUni[p.university].push(p);});
  let ordered=[];
  UNI_ORDER.forEach(function(uni){if(byUni[uni])ordered=ordered.concat(byUni[uni]);});
  let capsules='';
  ordered.forEach(function(p){
    const color=uniColors[p.uniKey]||'#6B7280';
    capsules+='<button onclick="quickCopyChatter(\''+p.id+'\', this)" title="'+escapeHtml(p.short)+'" style="background:'+color+'" class="qc-capsule"><div class="qc-capsule-wrike">'+p.wrike+'</div><div class="qc-capsule-name">'+escapeHtml(p.short)+'</div></button>';
  });
  let legend='';
  UNI_ORDER.forEach(function(uni){
    const sample=byUni[uni]?byUni[uni][0]:null;
    if(!sample)return;
    const color=uniColors[sample.uniKey]||'#6B7280';
    legend+='<div style="display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:var(--bg);border-radius:999px;font-size:10.5px;font-weight:600;color:var(--text-soft)"><div style="width:8px;height:8px;border-radius:50%;background:'+color+'"></div>'+escapeHtml(uni)+'</div>';
  });
  let html='<div class="fade-in">';
  html+='<div class="greeting">⚡ Quick Chatter Copy</div>';
  html+='<div class="greeting-sub">Click any program to instantly copy its Chatter Note to clipboard. No navigation needed.</div>';
  html+='<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">'+legend+'</div>';
  html+='<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:16px"><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:10px">'+capsules+'</div></div>';
  html+='<div style="margin-top:18px;padding:14px 18px;background:var(--info-light);border-left:3px solid var(--info);border-radius:var(--r-sm);font-size:12.5px;line-height:1.65">💡 <strong>Tip:</strong> Each capsule copies default Chatter Note format. Customize per program in Templates Hub.</div>';
  html+='</div>';
  document.getElementById('viewRoot').innerHTML=html;
}

function quickCopyChatter(progId,btn){
  const text=formatChatterText(progId);
  navigator.clipboard.writeText(text).then(function(){
    if(btn){
      const origHTML=btn.innerHTML;
      const origBg=btn.style.background;
      btn.innerHTML='<div style="font-size:13px;font-weight:800">✓ Copied</div>';
      btn.style.background='#0F9D58';
      btn.style.transform='scale(1.03)';
      setTimeout(function(){
        btn.innerHTML=origHTML;
        btn.style.background=origBg;
        btn.style.transform='';
      },1100);
    }
    const p=PROG_BY_ID[progId];
    showToast('Chatter Note copied: '+(p?p.wrike:progId));
  }).catch(function(err){
    showToast('Copy failed');
  });
}

/* INTERACTIVE TUTORIAL */
let TUT_STEP=0;
const TUTORIAL_STEPS=[
  {title:'Welcome to Pitch Cockpit',lead:'A consultative advisory tool for executive education learners. Title IV compliant. 13-stage call flow built around SPIN + Challenger methodology.',tip:'This tutorial takes 2-3 minutes. Skip and return any time.'},
  {title:'Set up your profile',lead:'Your Advisor Name, Ring DNA, and Skip Manager auto-fill every Chatter Note, Zendesk ticket, Vendor form, and TA Refund email.',tip:'After this tutorial, go to Settings to set them. Takes 30 seconds.'},
  {title:'Run a real call',lead:'Click any program to open the 13-stage flow. Each stage has Coach Notes, scripts you can copy, probes, and a checklist.',tip:'Click 💬 Copy to Chat in the hero card to instantly copy that program\'s Chatter Note.'},
  {title:'Templates Hub for post-call work',lead:'4 tabs: Chatter (post-call doc), Zendesk (tickets), Vendor (registration), TA Refund (refund requests with email generator).',tip:'All produce HTML tables that paste cleanly into Outlook/Gmail/Wrike.'},
  {title:'Quick Chatter for power users',lead:'Click ⚡ Quick Chatter in the sidebar. 14 colored capsules — one click copies that program\'s Chatter Note. Perfect for end-of-day batch logging.',tip:'No need to open a program page. Just click and paste.'},
  {title:'World Clock + Currency',lead:'12 cities including Nigeria/Lagos. Two currency converters (USD and GBP) covering 11 currencies with live rates.',tip:'Business hours show green. Late hours show red. Useful for scheduling international callbacks.'},
  {title:'You are ready',lead:'You now know enough to run real calls. The cockpit is designed so everything important is 1-2 clicks away.',tip:'Re-open this tutorial any time from the Getting Started card on Dashboard.'}
];

function openTutorial(){TUT_STEP=0;renderTutorial();}
function renderTutorial(){
  const existing=document.getElementById('tutOverlay');
  if(existing)existing.remove();
  const step=TUTORIAL_STEPS[TUT_STEP];
  const total=TUTORIAL_STEPS.length;
  const isLast=TUT_STEP===total-1;
  const isFirst=TUT_STEP===0;
  let dots='';
  for(let i=0;i<total;i++){
    const cls=i<TUT_STEP?'tut-dot done':i===TUT_STEP?'tut-dot active':'tut-dot';
    dots+='<div class="'+cls+'" style="height:4px;flex:1;background:'+(i<TUT_STEP||i===TUT_STEP?'var(--primary)':'var(--border-strong)')+';border-radius:2px"></div>';
  }
  const backBtn=isFirst?'<span onclick="closeTutorial()" style="font-size:12px;color:var(--text-muted);cursor:pointer">Skip</span>':'<button class="btn btn-ghost" onclick="tutorialPrev()">← Back</button>';
  const nextBtn=isLast?'<button class="btn btn-primary" onclick="closeTutorial()">Finish ✓</button>':'<button class="btn btn-primary" onclick="tutorialNext()">Next →</button>';
  const overlay=document.createElement('div');
  overlay.id='tutOverlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(15,20,35,.7);backdrop-filter:blur(4px);z-index:9500;display:flex;align-items:center;justify-content:center;padding:24px';
  overlay.onclick=e=>{if(e.target===overlay)closeTutorial();};
  overlay.innerHTML='<div style="background:var(--surface);border-radius:var(--r-md);max-width:680px;width:100%;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)"><div style="padding:18px 24px;background:linear-gradient(135deg,var(--primary),var(--primary-deep));color:#fff;display:flex;align-items:center;justify-content:space-between"><div style="font-weight:700;font-size:16px">🎓 Quick Tutorial</div><button onclick="closeTutorial()" style="background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.25);color:#fff;width:32px;height:32px;border-radius:7px;cursor:pointer">✕</button></div><div style="padding:14px 24px;background:var(--bg);display:flex;align-items:center;gap:12px"><span style="font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--text-muted)">Step '+(TUT_STEP+1)+' of '+total+'</span><div style="flex:1;display:flex;gap:5px">'+dots+'</div></div><div style="padding:26px 28px;overflow-y:auto;flex:1"><div style="font-size:22px;font-weight:800;letter-spacing:-.4px;margin-bottom:12px;line-height:1.25">'+escapeHtml(step.title)+'</div><div style="font-size:14px;color:var(--text-soft);line-height:1.65;margin-bottom:18px">'+escapeHtml(step.lead)+'</div><div style="padding:14px 16px;background:var(--accent-light);border-left:3px solid var(--accent);border-radius:var(--r-sm);font-size:12.5px;line-height:1.6"><span style="color:var(--accent);font-weight:700;text-transform:uppercase;font-size:10.5px;display:block;margin-bottom:5px">Pro Tip</span>'+escapeHtml(step.tip)+'</div></div><div style="padding:14px 24px;background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px">'+backBtn+'<div>'+nextBtn+'</div></div></div>';
  document.body.appendChild(overlay);
}
function tutorialNext(){if(TUT_STEP<TUTORIAL_STEPS.length-1){TUT_STEP++;renderTutorial();}}
function tutorialPrev(){if(TUT_STEP>0){TUT_STEP--;renderTutorial();}}
function closeTutorial(){const o=document.getElementById('tutOverlay');if(o)o.remove();}
document.addEventListener('keydown',e=>{if(!document.getElementById('tutOverlay'))return;if(e.key==='Escape')closeTutorial();else if(e.key==='ArrowRight')tutorialNext();else if(e.key==='ArrowLeft')tutorialPrev();});
